input_guardrail:
  # Prompt-level defense.
  # Blocks broad instruction-override patterns before sending the prompt to the model.
  action: block
  refusal_message: "I cannot help with requests that try to override, ignore, or reveal system instructions."
  suspicious_patterns:
    - ignore previous instructions
    - ignore all previous instructions
    - disregard previous instructions
    - override your instructions
    - forget your instructions
    - reveal your system prompt
    - system prompt
    - hidden instructions

output_patch:
  # Response-level defense.
  # Replaces responses that appear harmful or reveal hidden/system instructions.
  fallback_message: "I cannot provide a response that appears to reveal hidden instructions or produce harmful instruction-override content."
  unsafe_response_patterns:
    - I hate humans
    - kill humans
    - kill all humans
    - I will ignore previous instructions
    - system prompt is
    - hidden instructions are